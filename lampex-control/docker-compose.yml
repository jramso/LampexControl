version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lampex-local-db
    environment:
      POSTGRES_DB: defaultdb
      POSTGRES_USER: avnadmin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Carregar scripts de migração automática ao subir o container
      - ./db/migrations:/docker-entrypoint-initdb.d

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: lampex-auth-worker
    ports:
      - "8787:8787"
    environment:
      DATABASE_URL: "postgresql://avnadmin:password@db:5432/defaultdb"
      JWT_SECRET: "your_jwt_secret_here"
    depends_on:
      - db

volumes:
  pgdata:
